name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - main.py
      - requirements.txt
      - .github/workflows/build-exe.yml

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: |
          cd patterns_analyzer
          pyinstaller --clean --noconfirm --onefile --name patterns_analyzer main.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: percy-skin-editor-exe
          path: |
            patterns_analyzer/dist/patterns_analyzer.exe
          if-no-files-found: error
